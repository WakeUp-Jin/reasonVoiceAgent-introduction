<!doctype html>
<html>
  <head>
    <meta charset="utf-8" />
    <script>
      var repo = '/reasonVoiceAgent-introduction';
      var fullPath = window.location.pathname;
      var relativePath = fullPath.startsWith(repo)
        ? fullPath.slice(repo.length)
        : fullPath;
      var search = window.location.search;
      var hash = window.location.hash;
      window.location.replace(
        window.location.origin + repo + '/?p=' + encodeURIComponent(relativePath + search + hash)
      );
    </script>
  </head>
</html>
